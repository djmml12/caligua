<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />

    <!--
      Tablet viewport:
      - initial-scale=1: render at device CSS pixels
      - maximum-scale=1 + user-scalable=no: prevent accidental pinch-zoom in POS context
      - viewport-fit=cover: fill notched/rounded screen edges (iPad safe areas)
    -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />

    <!-- Chromium/WebView display mode (Android tablets) -->
    <meta name="mobile-web-app-capable" content="yes" />
    <!-- iOS Safari fullscreen when added to home screen -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Prevent iOS tap highlight on the whole app -->
    <meta name="format-detection" content="telephone=no" />

    <!-- PWA theme color — terracotta (matches --primary) -->
    <meta name="theme-color" content="#c2410c" />
    <meta name="apple-mobile-web-app-title" content="Tu Empresa" />

    <link rel="icon"             href="/icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icons/icon.svg" />
    <title>Tu Empresa · Caja</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
